name: Portfolio data enrichment

# Runs the local agent team (/team) headless in CI to curate the portfolio's
# closed dataset from real sources (GitHub, pelayomendez.dev, optional LinkedIn
# export), then opens a PR. Branch-and-commit mode: it NEVER pushes to main and
# NEVER deploys — Vercel only deploys on merge to main, which stays a human step.

on:
  schedule:
    - cron: "17 5 * * *" # daily ~05:17 UTC (~07:17 Europe/Madrid). Off-minute on purpose.
  workflow_dispatch: {} # manual run from the Actions tab

permissions:
  contents: write # create the enrichment branch + commit
  pull-requests: write # open the review PR

concurrency:
  group: portfolio-data-enrichment
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run the agent team (data enrichment)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          claude -p "$(cat .github/agent-objectives/portfolio-data-enrichment.md)" \
            --model sonnet \
            --dangerously-skip-permissions \
            --verbose

      - name: Typecheck (QA gate)
        run: npm run typecheck --workspace=portfolio

      - name: Open PR if the dataset changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet -- apps/portfolio/lib/data; then
            echo "No dataset changes — nothing to propose."
            exit 0
          fi
          DATE="$(date +%Y-%m-%d)"
          BRANCH="data-enrichment/$DATE"
          git config user.name "portfolio-data-bot"
          git config user.email "actions@users.noreply.github.com"
          git checkout -b "$BRANCH"
          # Only the dataset directory is committed — stray edits elsewhere are dropped.
          git add apps/portfolio/lib/data
          git commit -m "chore(portfolio): scheduled dataset enrichment ($DATE)"
          git push origin "$BRANCH"
          gh pr create --base main --head "$BRANCH" \
            --title "Portfolio dataset enrichment — $DATE" \
            --body "Automated enrichment of \`apps/portfolio/lib/data\` by the \`/team\` agent workflow.

          Review the diff, then merge to deploy (merging to \`main\` is what triggers the Vercel deploy).

          Spec: \`.hdd/specs/2026-06-24-portfolio-data-enrichment.md\`

          🤖 Generated with [Claude Code](https://claude.com/claude-code)"
